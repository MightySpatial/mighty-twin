; Twin API Alembic config — points at the shared mighty_migrations env.
; DATABASE_URL is supplied via process env (see env.py override).

[alembic]
script_location = %(here)s/../../python/mighty_migrations/src/mighty_migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://mighty:mighty@localhost:5433/mightytwin

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
