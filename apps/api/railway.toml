[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Explicit startCommand so Railway dashboard override cannot bypass migrations.
startCommand = "sh -c 'uv run alembic upgrade head && uv run uvicorn twin_api.main:app --host 0.0.0.0 --port ${PORT:-8080}'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
