[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# startCommand intentionally omitted — Dockerfile CMD runs alembic
# migrations then boots uvicorn, and overriding it here would skip the
# migration step.
[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
