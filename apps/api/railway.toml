[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Migrations run inside the FastAPI lifespan (bootstrap.run_migrations).
# No startCommand here — the Dockerfile CMD boots uvicorn directly.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
